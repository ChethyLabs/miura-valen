<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miura Valen 📖</title>
  <meta name="description" content="A cosy A/L study tracker for two" />
  <meta name="theme-color" content="#FAF7F2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Miura Valen" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon + Apple icons -->
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Firebase v8 (compat) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <div id="root">
    <!-- Initial loading screen -->
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;font-family:'Georgia',serif;">
      <div style="font-size:4rem;animation:spin 2s linear infinite">📖</div>
      <p style="color:#9E8A79;font-size:0.9rem">Loading Miura Valen…</p>
    </div>
  </div>

  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>

  <!-- App scripts -->
  <script src="js/app.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/past-papers.js"></script>
  <script src="js/class-papers.js"></script>
  <script src="js/mistake-log.js"></script>
  <script src="js/syllabus.js"></script>
  <script src="js/pages.js"></script>

  <script>
    // Initialize Firebase with config from app.js
    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }

    // Boot the app
    window.addEventListener('DOMContentLoaded', () => {
      App.init();
    });

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      // Works on both localhost and GitHub Pages subdirectory
      const swUrl = new URL('./sw.js', window.location.href).href;
      navigator.serviceWorker.register(swUrl, { scope: './' })
        .then(reg => console.log('[SW] Registered:', reg.scope))
        .catch(err => console.warn('[SW] Registration failed:', err));
    }
  </script>

</body>
</html>
